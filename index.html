<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정처기 필기 시험용 단일 HTML</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --surface-soft: #eef3f8;
      --text: #18202a;
      --muted: #5a6573;
      --line: #dfe7ef;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --green: #0f766e;
      --green-soft: #ccfbf1;
      --purple: #7c3aed;
      --orange: #ea580c;
      --red: #dc2626;
      --success: #15803d;
      --danger: #dc2626;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      font-family: "Pretendard Variable", "Pretendard", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top left, rgba(37,99,235,.08), transparent 28%), var(--bg);
      color: var(--text);
      line-height: 1.55;
    }
    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px 16px 96px;
    }
    h1,h2,h3,h4,p { margin: 0; }
    .hero {
      display: grid;
      gap: 14px;
      margin-bottom: 18px;
    }
    .title {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .subtitle {
      color: var(--muted);
      font-size: 1rem;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 16px 0 20px;
    }
    .chip, .btn, .nav-btn, .answer-btn, .small-btn {
      border: 0;
      border-radius: 14px;
      font: inherit;
      cursor: pointer;
      transition: .18s ease;
    }
    .chip, .small-btn {
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 10px 14px;
      color: var(--text);
    }
    .chip.active, .nav-btn.active {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: #bfdbfe;
      font-weight: 700;
    }
    .btn {
      background: var(--primary);
      color: #fff;
      padding: 12px 16px;
      font-weight: 700;
    }
    .small-btn {
      padding: 8px 12px;
      font-size: .92rem;
    }
    .small-btn.danger { color: var(--danger); }
    .small-btn.primary-lite {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: #bfdbfe;
    }
    .chip:hover,.btn:hover,.nav-btn:hover,.answer-btn:hover,.small-btn:hover { transform: translateY(-1px); }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .stat strong { font-size: 1.25rem; }
    .stat p { color: var(--muted); margin-bottom: 8px; }
    .tabs {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(246,248,251,.9);
      backdrop-filter: blur(8px);
      padding: 8px 0 12px;
      margin-bottom: 12px;
    }
    .tab-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .nav-btn {
      white-space: nowrap;
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 10px 14px;
      color: var(--text);
    }
    .page { display: none; gap: 16px; }
    .page.active { display: flex; flex-direction: column; }
    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
    }
    .section-head h2 {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .section-head p { color: var(--muted); margin-top: 4px; }
    .subject-grid, .grid-2, .grid-3 {
      display: grid;
      gap: 12px;
    }
    .subject-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .subject-card {
      display: flex;
      gap: 12px;
      align-items: center;
      border-left: 5px solid var(--primary);
    }
    .subject-icon { font-size: 1.6rem; }
    .muted { color: var(--muted); }
    .stack { display: flex; flex-direction: column; gap: 12px; }
    .bullet-list { margin: 10px 0 0; padding-left: 18px; }
    .bullet-list li + li { margin-top: 6px; }
    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .bookmark-btn {
      border: 0;
      background: var(--surface-soft);
      min-width: 42px;
      height: 42px;
      border-radius: 12px;
      font-size: 1.2rem;
      cursor: pointer;
      color: #f59e0b;
    }
    .bookmark-btn:hover { transform: translateY(-1px); }
    .badge {
      display: inline-flex;
      align-items: center;
      background: var(--surface-soft);
      color: var(--muted);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: .82rem;
      margin-bottom: 8px;
    }
    .info-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 10px; }
    .info-item {
      background: var(--surface-soft);
      border-radius: 16px;
      padding: 14px;
    }
    .info-item span { display: block; color: var(--muted); font-size: .9rem; margin-bottom: 4px; }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      min-width: 520px;
      border-collapse: collapse;
      margin-top: 8px;
    }
    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f8fafc;
      font-weight: 800;
    }
    .filter-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .quiz-question { font-size: 1.05rem; font-weight: 700; }
    .answer-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .answer-btn {
      flex: 1;
      min-height: 48px;
      background: var(--surface-soft);
      font-weight: 800;
      font-size: 1rem;
      color: var(--text);
    }
    .answer-btn.selected { background: var(--primary-soft); color: var(--primary); }
    .result {
      margin-top: 12px;
      padding: 11px 13px;
      border-radius: 14px;
      font-weight: 700;
    }
    .result.correct { background: #ecfdf5; color: var(--success); }
    .result.wrong { background: #fef2f2; color: var(--danger); }
    .toggle-btn {
      width: 100%;
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px dashed #bfdbfe;
      background: transparent;
      color: var(--primary);
      font-weight: 700;
      cursor: pointer;
    }
    .explanation {
      display: none;
      margin-top: 12px;
      background: var(--surface-soft);
      border-radius: 16px;
      padding: 14px;
    }
    .explanation.open { display: block; }
    .row-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 18px;
      padding: 24px;
      background: var(--surface);
    }
    .sql-box textarea {
      width: 100%;
      min-height: 140px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      font: inherit;
      resize: vertical;
      background: #fcfdff;
    }
    .sql-answer, .sql-hint {
      display: none;
      margin-top: 12px;
      background: var(--surface-soft);
      border-radius: 16px;
      padding: 14px;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .95rem;
    }
    .sql-answer.open, .sql-hint.open { display: block; }
    .footer-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: .93rem;
    }
    @media (max-width: 720px) {
      .stats, .subject-grid, .grid-2, .grid-3, .info-grid { grid-template-columns: 1fr; }
      .app { padding: 16px 14px 80px; }
      .title { font-size: 1.5rem; }
      .card { border-radius: 18px; padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <h1 class="title">정처기 필기 시험용 단일 HTML</h1>
      <p class="subtitle">5/9 시험 직전 회독용 · 핵심정리 · 비교표 · OX · 자주기출 · 오답 자동저장 · 북마크 · SQL 연습</p>
      <div class="toolbar">
        <button class="btn" id="goOxBtn">오늘의 OX 풀기</button>
        <button class="small-btn" id="exportBtn">내 답안/메모 백업</button>
        <button class="small-btn danger" id="resetAllBtn">전체 데이터 초기화</button>
      </div>
    </section>

    <section class="stats" id="statsRow"></section>

    <div class="tabs">
      <div class="tab-row">
        <button class="nav-btn active" data-page="home">홈</button>
        <button class="nav-btn" data-page="concepts">핵심정리</button>
        <button class="nav-btn" data-page="ox">OX</button>
        <button class="nav-btn" data-page="frequent">자주기출</button>
        <button class="nav-btn" data-page="wrong">오답노트</button>
        <button class="nav-btn" data-page="bookmarks">북마크</button>
        <button class="nav-btn" data-page="sql">SQL 연습</button>
      </div>
    </div>

    <section class="page active" id="page-home"></section>
    <section class="page" id="page-concepts"></section>
    <section class="page" id="page-ox"></section>
    <section class="page" id="page-frequent"></section>
    <section class="page" id="page-wrong"></section>
    <section class="page" id="page-bookmarks"></section>
    <section class="page" id="page-sql"></section>
  </div>

  <script>
    const SUBJECTS = [
      { id: 1, title: '소프트웨어 설계', shortTitle: '1과목', icon: '📐', color: '#2563eb' },
      { id: 2, title: '소프트웨어 개발', shortTitle: '2과목', icon: '⚙️', color: '#0f766e' },
      { id: 3, title: '데이터베이스 구축', shortTitle: '3과목', icon: '🗄️', color: '#7c3aed' },
      { id: 4, title: '프로그래밍 언어 활용', shortTitle: '4과목', icon: '💻', color: '#ea580c' },
      { id: 5, title: '정보시스템 구축관리', shortTitle: '5과목', icon: '🌐', color: '#dc2626' },
    ];

    const CONCEPTS = [
      { id:'c-1-req', subject:1, title:'요구사항 핵심정리', summary:'기능 요구사항과 비기능 요구사항 구분이 핵심이다.', bullets:['기능 = 시스템이 해야 할 일','비기능 = 성능·보안·품질','시험에서 두 개념을 자주 섞어낸다'] },
      { id:'c-1-uml', subject:1, title:'UML 핵심정리', summary:'다이어그램 종류와 역할 구분이 중요하다.', bullets:['유스케이스 = 사용자와 기능 관계','클래스 = 정적 구조','시퀀스 = 시간 순서 메시지'] },
      { id:'c-2-sort', subject:2, title:'정렬 핵심정리', summary:'방식·시간복잡도·안정정렬 여부를 연결해서 외우는 것이 중요하다.', bullets:['버선삽 = O(n²)','퀵병힙 = O(n log n) 계열','퀵 최악은 O(n²)'] },
      { id:'c-2-test', subject:2, title:'테스트 핵심정리', summary:'단위·통합·시스템·인수 테스트 구분이 자주 나온다.', bullets:['단위 = 모듈','통합 = 인터페이스','시스템 = 전체 / 인수 = 사용자 요구'] },
      { id:'c-3-dbms', subject:3, title:'DBMS 핵심정리', summary:'정의·조작·제어 기능과 스키마/인스턴스 구분이 핵심이다.', bullets:['스키마 = 틀','인스턴스 = 값','RDBMS = 테이블 구조'] },
      { id:'c-3-normal', subject:3, title:'정규화 핵심정리', summary:'1NF, 2NF, 3NF 구분이 가장 중요하다.', bullets:['1NF = 원자값','2NF = 부분 함수 종속 제거','3NF = 이행 함수 종속 제거'] },
      { id:'c-4-op', subject:4, title:'연산자 핵심정리', summary:'= 와 ==, 논리 연산자, 우선순위 문제를 많이 묻는다.', bullets:['= 는 대입','== 는 비교','&& / || 구분'] },
      { id:'c-4-pointer', subject:4, title:'포인터 핵심정리', summary:'주소와 값의 차이를 이해해야 한다.', bullets:['포인터 = 주소 저장','& = 주소','* = 가리키는 값'] },
      { id:'c-5-osi', subject:5, title:'OSI 7계층 핵심정리', summary:'계층별 역할과 대표 키워드를 연결해서 외우면 좋다.', bullets:['전송 계층 = TCP/UDP','네트워크 계층 = IP/라우팅','응용 계층 = HTTP/FTP/SMTP'] },
      { id:'c-5-crypto', subject:5, title:'암호화 핵심정리', summary:'대칭키·비대칭키와 대표 알고리즘 구분이 자주 출제된다.', bullets:['AES = 대칭키','RSA = 비대칭키','해시 = 일방향'] },
    ];

    const INFOGRAPHICS = [
      { id:'i-1-uml', subject:1, title:'UML 빠른 구분', items:[['유스케이스','사용자-기능 관계'],['클래스','정적 구조'],['시퀀스','시간 순서 메시지'],['액티비티','흐름 표현']] },
      { id:'i-2-sort', subject:2, title:'정렬 한눈에 보기', items:[['버블','인접 교환 🫧'],['선택','최솟값 선택 🎯'],['삽입','알맞은 위치 삽입 🃏'],['퀵','피벗 분할 ⚡']] },
      { id:'i-3-schema', subject:3, title:'3단계 스키마', items:[['외부','사용자 관점 👀'],['개념','전체 논리 구조 🧠'],['내부','물리 저장 구조 💾']] },
      { id:'i-4-op', subject:4, title:'연산자 빠른 구분', items:[['=','대입'],['==','같다 비교'],['&&','AND'],['||','OR']] },
      { id:'i-5-security', subject:5, title:'보안 공격 빠른 구분', items:[['SQL Injection','DB 질의 악용'],['XSS','스크립트 삽입'],['Sniffing','도청'],['Spoofing','신분 위조']] },
    ];

    const TABLES = [
      {
        id:'t-1-req', subject:1, title:'기능 요구사항 vs 비기능 요구사항',
        headers:['구분','의미','예시'],
        rows:[
          ['기능 요구사항','시스템이 해야 할 일','회원가입, 로그인'],
          ['비기능 요구사항','품질·성능·보안 등 조건','응답속도, 보안성']
        ]
      },
      {
        id:'t-2-sort', subject:2, title:'정렬 비교표',
        headers:['정렬','핵심 방식','평균','최악','안정 정렬'],
        rows:[
          ['버블','인접 비교·교환','O(n²)','O(n²)','O'],
          ['선택','최솟값 선택','O(n²)','O(n²)','X'],
          ['삽입','정렬된 부분에 삽입','O(n²)','O(n²)','O'],
          ['퀵','피벗 분할','O(n log n)','O(n²)','X'],
          ['병합','분할 후 병합','O(n log n)','O(n log n)','O'],
        ]
      },
      {
        id:'t-3-db', subject:3, title:'DB · DBMS · 스키마 · 인스턴스 비교',
        headers:['개념','뜻','한 줄 기억'],
        rows:[
          ['DB','관련 데이터의 집합','데이터 저장소'],
          ['DBMS','데이터베이스 관리 소프트웨어','관리 프로그램'],
          ['스키마','구조와 설계','틀'],
          ['인스턴스','실제 저장된 값','현재 데이터']
        ]
      },
      {
        id:'t-4-lang', subject:4, title:'C / Java / Python 비교표',
        headers:['언어','특징','시험 포인트'],
        rows:[
          ['C','포인터, 배열, 절차적 스타일','printf, 포인터'],
          ['Java','객체지향, 클래스 기반','클래스, main'],
          ['Python','간결한 문법, 들여쓰기 중요','리스트, 들여쓰기']
        ]
      },
      {
        id:'t-5-crypto', subject:5, title:'대칭키 vs 비대칭키',
        headers:['항목','대칭키','비대칭키'],
        rows:[
          ['키 사용','암복호화에 같은 키','공개키/개인키 분리'],
          ['속도','빠름','상대적으로 느림'],
          ['대표 알고리즘','AES','RSA']
        ]
      },
    ];

    const QUIZZES = [
      // OX
      { id:'q1', subject:1, type:'ox', question:'기능 요구사항은 시스템이 반드시 수행해야 하는 기능을 의미한다.', answer:'O', explanation:'기능 요구사항은 시스템이 해야 할 기능 자체를 의미한다.', keyword:'요구사항' },
      { id:'q2', subject:1, type:'ox', question:'유스케이스 다이어그램은 시스템의 정적 구조를 표현한다.', answer:'X', explanation:'유스케이스는 사용자와 시스템 기능 관계를 표현한다.', keyword:'UML' },
      { id:'q3', subject:2, type:'ox', question:'버블 정렬은 인접한 두 원소를 비교하여 교환하는 방식이다.', answer:'O', explanation:'버블 정렬의 핵심은 인접 교환이다.', keyword:'정렬' },
      { id:'q4', subject:2, type:'ox', question:'선택 정렬은 안정 정렬이다.', answer:'X', explanation:'선택 정렬은 일반적으로 불안정 정렬이다.', keyword:'정렬' },
      { id:'q5', subject:2, type:'ox', question:'이진 탐색은 정렬된 데이터에서 사용한다.', answer:'O', explanation:'정렬되지 않으면 절반씩 줄여 탐색할 수 없다.', keyword:'탐색' },
      { id:'q6', subject:3, type:'ox', question:'스키마는 특정 시점의 실제 데이터 값이다.', answer:'X', explanation:'스키마는 구조와 설계이고 실제 값은 인스턴스다.', keyword:'DBMS' },
      { id:'q7', subject:3, type:'ox', question:'GRANT는 권한 부여 명령이다.', answer:'O', explanation:'GRANT는 권한 부여, REVOKE는 회수다.', keyword:'SQL' },
      { id:'q8', subject:4, type:'ox', question:'배열의 인덱스는 일반적으로 1부터 시작한다.', answer:'X', explanation:'대부분의 언어에서 배열 인덱스는 0부터 시작한다.', keyword:'배열' },
      { id:'q9', subject:4, type:'ox', question:'포인터는 메모리 주소를 저장하는 변수이다.', answer:'O', explanation:'포인터의 핵심 정의다.', keyword:'포인터' },
      { id:'q10', subject:5, type:'ox', question:'TCP는 신뢰성 있는 전송을 지원한다.', answer:'O', explanation:'TCP는 연결형이며 신뢰성 있는 전송을 제공한다.', keyword:'TCP/IP' },
      { id:'q11', subject:5, type:'ox', question:'RSA는 대표적인 대칭키 암호 방식이다.', answer:'X', explanation:'RSA는 비대칭키 암호 방식이다.', keyword:'암호화' },
      // frequent
      { id:'f1', subject:1, type:'frequent', question:'비기능 요구사항에는 보안성과 성능이 포함될 수 있다.', answer:'O', explanation:'보안성과 성능은 대표적인 비기능 요구사항이다.', keyword:'빈출' },
      { id:'f2', subject:2, type:'frequent', question:'퀵 정렬의 평균 시간복잡도는 O(n log n)이다.', answer:'O', explanation:'퀵 정렬은 평균적으로 O(n log n), 최악은 O(n²)이다.', keyword:'빈출' },
      { id:'f3', subject:3, type:'frequent', question:'기본키는 NULL 값을 허용할 수 있다.', answer:'X', explanation:'기본키는 NULL을 허용하지 않는다.', keyword:'빈출' },
      { id:'f4', subject:4, type:'frequent', question:'`=`는 값을 비교하는 연산자이다.', answer:'X', explanation:'`=`는 대입 연산자이고 `==`가 비교 연산자다.', keyword:'빈출' },
      { id:'f5', subject:5, type:'frequent', question:'SQL Injection은 웹 입력값을 통해 DB 질의를 조작하는 공격이다.', answer:'O', explanation:'대표적인 웹 보안 공격이다.', keyword:'빈출' },
    ];

    const SQL_PRACTICE = [
      {
        id:'sql1', subject:3, title:'회원 테이블에서 모든 회원 조회',
        prompt:'member 테이블의 모든 컬럼을 조회하는 SQL을 작성하시오.',
        hint:'전체 조회는 SELECT와 * 를 먼저 떠올리면 된다.',
        answer:'SELECT *\nFROM member;',
        explanation:'모든 컬럼을 조회할 때는 SELECT * FROM 테이블명; 형태를 사용한다.'
      },
      {
        id:'sql2', subject:3, title:'도서 테이블에서 제목만 조회',
        prompt:'book 테이블에서 title 컬럼만 조회하는 SQL을 작성하시오.',
        hint:'특정 컬럼만 조회할 때는 SELECT 컬럼명 FROM 테이블명;',
        answer:'SELECT title\nFROM book;',
        explanation:'특정 컬럼 조회는 필요한 컬럼명만 SELECT 뒤에 적는다.'
      },
      {
        id:'sql3', subject:3, title:'조건 조회',
        prompt:'member 테이블에서 grade가 \"VIP\"인 회원의 name을 조회하는 SQL을 작성하시오.',
        hint:'WHERE 조건절을 붙이면 된다.',
        answer:'SELECT name\nFROM member\nWHERE grade = \"VIP\";',
        explanation:'조건 조회는 WHERE 절을 사용한다. 문자열은 작은따옴표를 쓰는 경우가 일반적이지만 시험 예시는 환경에 따라 다를 수 있다.'
      }
    ];

    const STORAGE_KEY = 'jeongcheogi-single-html-v1';
    const defaultState = {
      bookmarks: [],
      wrongAnswers: [],
      sqlDrafts: {},
      quizAnswers: {},
    };

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? { ...defaultState, ...JSON.parse(raw) } : { ...defaultState };
      } catch {
        return { ...defaultState };
      }
    }

    let state = loadState();

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function isBookmarked(itemId) {
      return state.bookmarks.some(b => b.id === itemId);
    }

    function toggleBookmark(itemId, itemType) {
      const exists = isBookmarked(itemId);
      if (exists) {
        state.bookmarks = state.bookmarks.filter(b => b.id !== itemId);
      } else {
        state.bookmarks.push({ id: itemId, type: itemType, savedAt: new Date().toISOString() });
      }
      saveState();
      renderAll();
    }

    function saveWrong(quizId, userAnswer) {
      const exists = state.wrongAnswers.some(w => w.quizId === quizId);
      if (!exists) {
        state.wrongAnswers.push({ quizId, userAnswer, savedAt: new Date().toISOString() });
        saveState();
      }
    }

    function removeWrong(quizId) {
      state.wrongAnswers = state.wrongAnswers.filter(w => w.quizId !== quizId);
      saveState();
      renderWrongPage();
      renderStats();
    }

    function clearWrong() {
      if (!confirm('오답노트를 전체 삭제할까요?')) return;
      state.wrongAnswers = [];
      saveState();
      renderWrongPage();
      renderStats();
    }

    function answerQuiz(quizId, value) {
      state.quizAnswers[quizId] = value;
      const quiz = QUIZZES.find(q => q.id === quizId);
      if (quiz && quiz.answer !== value) saveWrong(quizId, value);
      saveState();
      renderOxPage();
      renderFrequentPage();
      renderWrongPage();
      renderStats();
    }

    function setSqlDraft(id, value) {
      state.sqlDrafts[id] = value;
      saveState();
    }

    function createBookmarkButton(itemId, itemType) {
      const active = isBookmarked(itemId);
      return `<button class="bookmark-btn" data-bookmark-id="${itemId}" data-bookmark-type="${itemType}">${active ? '★' : '☆'}</button>`;
    }

    function subjectName(id) {
      const sub = SUBJECTS.find(s => s.id === id);
      return sub ? `${sub.icon} ${sub.shortTitle}` : '';
    }

    function renderStats() {
      const totalQuiz = QUIZZES.filter(q => q.type === 'ox').length;
      document.getElementById('statsRow').innerHTML = `
        <div class="card stat"><p>OX 문제</p><strong>${totalQuiz}개</strong></div>
        <div class="card stat"><p>오답노트</p><strong>${state.wrongAnswers.length}개</strong></div>
        <div class="card stat"><p>북마크</p><strong>${state.bookmarks.length}개</strong></div>
      `;
    }

    function renderHomePage() {
      const subjectCards = SUBJECTS.map(subject => {
        const conceptCount = CONCEPTS.filter(c => c.subject === subject.id).length;
        const oxCount = QUIZZES.filter(q => q.subject === subject.id && q.type === 'ox').length;
        const frequentCount = QUIZZES.filter(q => q.subject === subject.id && q.type === 'frequent').length;
        return `
          <div class="card subject-card" style="border-left-color:${subject.color}">
            <div class="subject-icon">${subject.icon}</div>
            <div>
              <p class="muted">${subject.shortTitle}</p>
              <h3>${subject.title}</h3>
              <p class="footer-note">핵심 ${conceptCount} · OX ${oxCount} · 기출 ${frequentCount}</p>
            </div>
          </div>`;
      }).join('');

      document.getElementById('page-home').innerHTML = `
        <div class="section-head">
          <div>
            <h2>빠른 시작</h2>
            <p>과목별 핵심과 문제 수를 한 번에 확인</p>
          </div>
        </div>
        <div class="subject-grid">${subjectCards}</div>
        <div class="section-head"><div><h2>시험 직전 우선순위</h2><p>2과목·3과목·5과목부터 빠르게 회독</p></div></div>
        <div class="grid-3">
          <div class="card"><h3>2과목</h3><p class="footer-note">정렬 · 탐색 · 테스트 · Big-O</p></div>
          <div class="card"><h3>3과목</h3><p class="footer-note">DBMS · 키 · 정규화 · SQL</p></div>
          <div class="card"><h3>5과목</h3><p class="footer-note">OSI · TCP/IP · 보안 · 암호화</p></div>
        </div>
      `;
    }

    function renderConceptsPage() {
      const conceptHtml = CONCEPTS.map(item => `
        <div class="card">
          <div class="card-head">
            <div>
              <span class="badge">${subjectName(item.subject)}</span>
              <h3>${item.title}</h3>
            </div>
            ${createBookmarkButton(item.id, 'concept')}
          </div>
          <p class="muted">${item.summary}</p>
          <ul class="bullet-list">${item.bullets.map(b => `<li>${b}</li>`).join('')}</ul>
        </div>
      `).join('');

      const infoHtml = INFOGRAPHICS.map(item => `
        <div class="card">
          <div class="card-head">
            <div>
              <span class="badge">${subjectName(item.subject)}</span>
              <h3>${item.title}</h3>
            </div>
            ${createBookmarkButton(item.id, 'infographic')}
          </div>
          <div class="info-grid">
            ${item.items.map(([label, value]) => `<div class="info-item"><span>${label}</span><strong>${value}</strong></div>`).join('')}
          </div>
        </div>
      `).join('');

      const tableHtml = TABLES.map(item => `
        <div class="card">
          <div class="card-head">
            <div>
              <span class="badge">${subjectName(item.subject)}</span>
              <h3>${item.title}</h3>
            </div>
            ${createBookmarkButton(item.id, 'table')}
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr>${item.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
              <tbody>
                ${item.rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `).join('');

      document.getElementById('page-concepts').innerHTML = `
        <div class="section-head"><div><h2>핵심정리</h2><p>짧게 읽고 바로 문제로 넘어가기 좋게 정리</p></div></div>
        <div class="stack">${conceptHtml}</div>
        <div class="section-head"><div><h2>인포그래픽 카드</h2><p>한눈에 구분하는 카드형 요약</p></div></div>
        <div class="stack">${infoHtml}</div>
        <div class="section-head"><div><h2>비교표</h2><p>헷갈리는 개념을 표로 정리</p></div></div>
        <div class="stack">${tableHtml}</div>
      `;
    }

    function quizCardHtml(quiz, showWrongDelete = false) {
      const selected = state.quizAnswers[quiz.id] || null;
      const result = selected ? (selected === quiz.answer ? 'correct' : 'wrong') : null;
      const isWrongSaved = state.wrongAnswers.some(w => w.quizId === quiz.id);
      return `
        <div class="card">
          <div class="card-head">
            <div>
              <span class="badge">${subjectName(quiz.subject)} · ${quiz.keyword || '문제'}</span>
              <div class="quiz-question">${quiz.question}</div>
            </div>
            ${createBookmarkButton(quiz.id, 'quiz')}
          </div>
          <div class="answer-row">
            <button class="answer-btn ${selected === 'O' ? 'selected' : ''}" data-answer="O" data-quiz-id="${quiz.id}">O</button>
            <button class="answer-btn ${selected === 'X' ? 'selected' : ''}" data-answer="X" data-quiz-id="${quiz.id}">X</button>
          </div>
          ${result ? `<div class="result ${result}">${result === 'correct' ? '정답입니다.' : `오답입니다. 정답: ${quiz.answer}`}</div>` : ''}
          <button class="toggle-btn" data-toggle-expl="${quiz.id}">해설 보기 ▼</button>
          <div class="explanation" id="expl-${quiz.id}"><strong>해설</strong><p>${quiz.explanation}</p></div>
          ${showWrongDelete && isWrongSaved ? `<div class="row-actions"><button class="small-btn danger" data-remove-wrong="${quiz.id}">오답에서 삭제</button></div>` : ''}
        </div>`;
    }

    function subjectFilterHtml(prefix, current) {
      return `
        <div class="filter-row">
          <button class="chip ${current === 0 ? 'active' : ''}" data-filter="${prefix}" data-subject="0">전체</button>
          ${SUBJECTS.map(s => `<button class="chip ${current === s.id ? 'active' : ''}" data-filter="${prefix}" data-subject="${s.id}">${s.icon} ${s.shortTitle}</button>`).join('')}
        </div>`;
    }

    let oxSubject = 0;
    let frequentSubject = 0;

    function renderOxPage() {
      const items = QUIZZES.filter(q => q.type === 'ox' && (oxSubject === 0 || q.subject === oxSubject));
      document.getElementById('page-ox').innerHTML = `
        <div class="section-head"><div><h2>OX 문제</h2><p>틀리면 오답노트에 자동 저장</p></div></div>
        ${subjectFilterHtml('ox', oxSubject)}
        <div class="stack">${items.map(q => quizCardHtml(q)).join('')}</div>
      `;
      bindDynamicEvents();
    }

    function renderFrequentPage() {
      const items = QUIZZES.filter(q => q.type === 'frequent' && (frequentSubject === 0 || q.subject === frequentSubject));
      document.getElementById('page-frequent').innerHTML = `
        <div class="section-head"><div><h2>자주 기출문제</h2><p>시험 직전 빠르게 보는 대표 문제</p></div></div>
        ${subjectFilterHtml('frequent', frequentSubject)}
        <div class="stack">${items.map(q => quizCardHtml(q)).join('')}</div>
      `;
      bindDynamicEvents();
    }

    function renderWrongPage() {
      const items = QUIZZES.filter(q => state.wrongAnswers.some(w => w.quizId === q.id));
      document.getElementById('page-wrong').innerHTML = `
        <div class="section-head"><div><h2>오답노트</h2><p>오답 자동저장 · 개별 삭제 · 전체 삭제</p></div></div>
        ${items.length ? `<div class="row-actions"><button class="small-btn danger" id="clearWrongBtn">전체 삭제</button></div>` : ''}
        <div class="stack">${items.length ? items.map(q => quizCardHtml(q, true)).join('') : '<div class="empty">저장된 오답이 없습니다.</div>'}</div>
      `;
      bindDynamicEvents();
      const clearBtn = document.getElementById('clearWrongBtn');
      if (clearBtn) clearBtn.onclick = clearWrong;
    }

    function renderBookmarksPage() {
      const typeMap = { concept:'핵심정리', infographic:'인포그래픽', table:'비교표', quiz:'문제' };
      const itemMap = new Map();
      [...CONCEPTS, ...INFOGRAPHICS, ...TABLES, ...QUIZZES].forEach(item => itemMap.set(item.id, item));
      const items = state.bookmarks.map(b => ({ ...b, ref: itemMap.get(b.id) })).filter(Boolean);
      document.getElementById('page-bookmarks').innerHTML = `
        <div class="section-head"><div><h2>북마크</h2><p>중요한 문제와 요약만 다시 보기</p></div></div>
        <div class="stack">
          ${items.length ? items.map(item => {
            const title = item.ref.title || item.ref.question || item.id;
            const subject = item.ref.subject ? subjectName(item.ref.subject) : '';
            return `<div class="card"><div class="card-head"><div><span class="badge">${typeMap[item.type]} ${subject ? '· ' + subject : ''}</span><h3>${title}</h3></div>${createBookmarkButton(item.id, item.type)}</div></div>`;
          }).join('') : '<div class="empty">북마크한 항목이 없습니다.</div>'}
        </div>
      `;
      bindDynamicEvents();
    }

    function renderSqlPage() {
      document.getElementById('page-sql').innerHTML = `
        <div class="section-head"><div><h2>SQL 연습</h2><p>실기 대비용 쓰기 연습 · 로컬 저장</p></div></div>
        <div class="stack">
          ${SQL_PRACTICE.map(item => `
            <div class="card sql-box">
              <div class="card-head">
                <div>
                  <span class="badge">3과목 · SQL 연습</span>
                  <h3>${item.title}</h3>
                </div>
                ${createBookmarkButton(item.id, 'sql')}
              </div>
              <p class="muted">${item.prompt}</p>
              <textarea data-sql-id="${item.id}" placeholder="여기에 SQL을 직접 작성하세요...">${state.sqlDrafts[item.id] || ''}</textarea>
              <div class="row-actions">
                <button class="small-btn" data-sql-toggle-hint="${item.id}">힌트 보기</button>
                <button class="small-btn primary-lite" data-sql-toggle-answer="${item.id}">예시답 보기</button>
              </div>
              <div class="sql-hint" id="sql-hint-${item.id}">${item.hint}</div>
              <div class="sql-answer" id="sql-answer-${item.id}">${item.answer}\n\n설명: ${item.explanation}</div>
            </div>
          `).join('')}
        </div>
      `;
      bindDynamicEvents();
    }

    function bindDynamicEvents() {
      document.querySelectorAll('[data-bookmark-id]').forEach(btn => {
        btn.onclick = () => toggleBookmark(btn.dataset.bookmarkId, btn.dataset.bookmarkType);
      });
      document.querySelectorAll('[data-answer]').forEach(btn => {
        btn.onclick = () => answerQuiz(btn.dataset.quizId, btn.dataset.answer);
      });
      document.querySelectorAll('[data-toggle-expl]').forEach(btn => {
        btn.onclick = () => {
          const box = document.getElementById('expl-' + btn.dataset.toggleExpl);
          if (!box) return;
          box.classList.toggle('open');
          btn.textContent = box.classList.contains('open') ? '해설 숨기기 ▲' : '해설 보기 ▼';
        };
      });
      document.querySelectorAll('[data-filter]').forEach(btn => {
        btn.onclick = () => {
          const type = btn.dataset.filter;
          const value = Number(btn.dataset.subject);
          if (type === 'ox') oxSubject = value;
          if (type === 'frequent') frequentSubject = value;
          renderOxPage();
          renderFrequentPage();
        };
      });
      document.querySelectorAll('[data-remove-wrong]').forEach(btn => {
        btn.onclick = () => removeWrong(btn.dataset.removeWrong);
      });
      document.querySelectorAll('[data-sql-id]').forEach(area => {
        area.oninput = (e) => setSqlDraft(area.dataset.sqlId, e.target.value);
      });
      document.querySelectorAll('[data-sql-toggle-hint]').forEach(btn => {
        btn.onclick = () => document.getElementById('sql-hint-' + btn.dataset.sqlToggleHint).classList.toggle('open');
      });
      document.querySelectorAll('[data-sql-toggle-answer]').forEach(btn => {
        btn.onclick = () => document.getElementById('sql-answer-' + btn.dataset.sqlToggleAnswer).classList.toggle('open');
      });
    }

    function renderAll() {
      renderStats();
      renderHomePage();
      renderConceptsPage();
      renderOxPage();
      renderFrequentPage();
      renderWrongPage();
      renderBookmarksPage();
      renderSqlPage();
      bindDynamicEvents();
    }

    function switchPage(pageName) {
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.page === pageName));
      document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
      document.getElementById('page-' + pageName).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => switchPage(btn.dataset.page));
    });

    document.getElementById('goOxBtn').onclick = () => switchPage('ox');
    document.getElementById('resetAllBtn').onclick = () => {
      if (!confirm('북마크, 오답, SQL 작성 내용을 모두 초기화할까요?')) return;
      state = JSON.parse(JSON.stringify(defaultState));
      saveState();
      renderAll();
      switchPage('home');
    };
    document.getElementById('exportBtn').onclick = () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'jeongcheogi-study-backup.json';
      a.click();
      URL.revokeObjectURL(url);
    };

    renderAll();
  </script>
</body>
</html>
